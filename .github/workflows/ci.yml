name: CI
on:
  push:
    branches: [main, trunk]
  pull_request:
    branches: [main, trunk]

jobs:
  quality-gate-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install (locked)
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Typecheck (tsc)
        run: npm run typecheck
      - name: Test (vitest, coverage >= 80)
        run: npm run test
      - name: Build (vite)
        run: npm run build
